name: Build & Release Windows installer

# Trigger on:
#   - any push of a "v*" tag (e.g. v0.6, v1.0) → build + create a GitHub Release
#   - manual run from the Actions tab → build + upload artifact only (no release)
#   - any push to main → build + upload artifact (catches breakage early)
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create a Release and upload assets

jobs:
  build:
    name: MSYS2 native build + NSIS installer
    runs-on: windows-latest

    # Make every "run" step execute inside the MSYS2 mingw64 shell, so PATH,
    # MSYSTEM, and pkgconf wrapper all point at the mingw64 toolchain.
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Set up MSYS2 (mingw64)
        # Pulls precompiled GTK4 + json-c + zlib + nsis from the official MSYS2
        # repos. Avoids the AUR/extra split that breaks the Arch container
        # approach (mingw-w64-gtk4 et al. aren't in core/extra).
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-json-c
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-adwaita-icon-theme
            mingw-w64-x86_64-nsis

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history for auto-generated release notes

      - name: Derive release version from tag
        id: version
        # On a "v0.6" tag push, RELEASE_VERSION=0.6. Otherwise leave empty so
        # build-installer.sh falls back to meson.build's version.
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Windows installer
        # MSYSTEM=MINGW64 is set by the msys2 shell wrapper, so package-windows.sh
        # auto-detects /mingw64/ as the runtime root.
        run: ./scripts/build-installer.sh

      - name: Show installer size
        run: ls -lh tqvaultc-*-setup.exe

      - name: Upload installer as workflow artifact
        # Always upload — useful for debugging non-tag builds.
        uses: actions/upload-artifact@v4
        with:
          name: tqvaultc-windows-installer
          path: tqvaultc-*-setup.exe
          if-no-files-found: error

      - name: Create GitHub Release
        # Only on tag pushes. Auto-generates release notes from PR/commit
        # history since the previous tag and attaches the installer.
        if: steps.version.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: tqvaultc-*-setup.exe
          generate_release_notes: true
          name: TQVaultC ${{ github.ref_name }}
          draft: false
          prerelease: false
